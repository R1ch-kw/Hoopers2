<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOOPER FLOW | ELITE AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --orange: #ff6b00; --dark-bg: #080808; }
        body { font-family: 'Inter', sans-serif; background-color: var(--dark-bg); color: white; }
        .font-sport { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,107,0,0.1); }
        .neon-border { border: 1px solid var(--orange); box-shadow: 0 0 15px rgba(255, 107, 0, 0.2); }
        .bubble-coach { background: #1a1a1a; border-left: 4px solid var(--orange); border-radius: 0 12px 12px 12px; margin-right: 15%; padding: 1rem; }
        .bubble-user { background: var(--orange); color: black; font-weight: 600; border-radius: 12px 12px 0 12px; margin-left: 15%; align-self: flex-end; padding: 1rem; }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4">

    <nav class="max-w-5xl w-full mx-auto p-5 flex justify-between items-center glass rounded-2xl mb-4 neon-border">
        <h1 class="font-sport text-xl italic font-bold">HOOPER<span class="text-orange-500">FLOW</span></h1>
        <div id="timer-display" class="font-sport text-orange-500 text-2xl tracking-tighter">25:00</div>
    </nav>

    <main class="max-w-5xl w-full mx-auto flex-1 flex flex-col glass rounded-3xl overflow-hidden neon-border">
        <div class="p-4 bg-zinc-900/50 border-b border-zinc-800 flex justify-between items-center">
            <span class="text-[10px] font-bold tracking-[0.2em] uppercase text-zinc-400">Elite Coach AI Active</span>
            <input type="password" id="api-key" placeholder="Pega tu API KEY aquí..." class="bg-black border border-zinc-700 rounded px-2 py-1 text-[10px] w-48 outline-none focus:border-orange-500">
        </div>
        
        <div id="chat-box" class="flex-1 p-6 overflow-y-auto h-[500px] flex flex-col gap-4">
            <div class="bubble-coach text-sm">
                🏀 Sistema inicializado. Soy tu Coach. Una vez pegues tu llave arriba, podré analizar tu juego y tus estudios con IA real. ¿Por dónde empezamos?
            </div>
        </div>

        <div class="p-4 bg-zinc-900/50 border-t border-zinc-800">
            <div class="flex gap-3 bg-black rounded-2xl p-2 border border-zinc-700">
                <input id="user-input" type="text" placeholder="Escribe un mensaje..." class="flex-1 bg-transparent outline-none p-3 text-sm">
                <button id="send-btn" class="bg-orange-600 px-8 py-3 rounded-xl font-black text-xs uppercase hover:bg-orange-500">ENVIAR</button>
            </div>
        </div>
    </main>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const apiKeyInput = document.getElementById('api-key');

        // Cargar llave automáticamente si ya existe
        window.onload = () => {
            const savedKey = localStorage.getItem('hoop_key');
            if(savedKey) {
                apiKeyInput.value = savedKey;
                appendMsg("🚀 Llave detectada. Sistema de conversación IA listo.", "coach");
            }
        };

        function appendMsg(text, type) {
            const div = document.createElement('div');
            div.className = type === 'coach' ? "bubble-coach text-sm shadow-xl" : "bubble-user text-sm shadow-xl";
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function talkToIA(prompt) {
            const key = apiKeyInput.value;
            if(!key) {
                appendMsg("⚠️ Error: Falta la API KEY.", "coach");
                return;
            }
            localStorage.setItem('hoop_key', key); // Guardar para la próxima vez

            appendMsg("Pensando...", "coach");
            const loadingMsg = chatBox.lastChild;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Actúa como un entrenador de baloncesto profesional y un experto en productividad de estudios. Responde de forma motivadora, técnica y conversacional. Usuario: ${prompt}` }] }]
                    })
                });

                const data = await response.json();
                loadingMsg.innerText = data.candidates[0].content.parts[0].text;
            } catch (e) {
                loadingMsg.innerText = "❌ Hubo un error. Revisa tu llave o tu conexión.";
            }
        }

        document.getElementById('send-btn').onclick = () => {
            if(!userInput.value) return;
            appendMsg(userInput.value, 'user');
            talkToIA(userInput.value);
            userInput.value = "";
        };

        userInput.addEventListener("keypress", (e) => { if(e.key === "Enter") document.getElementById('send-btn').click(); });
    </script>
</body>
</html>
