<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOOPER FLOW | ELITE AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --orange: #ff6b00; --dark-bg: #080808; }
        body { font-family: 'Inter', sans-serif; background-color: var(--dark-bg); color: white; margin: 0; overflow-x: hidden; }
        .font-sport { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,107,0,0.2); }
        .neon-border { border: 1px solid var(--orange); box-shadow: 0 0 20px rgba(255, 107, 0, 0.1); }
        .bubble-coach { background: #121212; border-left: 4px solid var(--orange); border-radius: 4px 15px 15px 15px; margin-right: 10%; padding: 1.2rem; }
        .bubble-user { background: var(--orange); color: black; font-weight: 800; border-radius: 15px 15px 4px 15px; margin-left: 10%; align-self: flex-end; padding: 1rem; }
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: var(--orange); border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col p-3 md:p-6">

    <nav class="max-w-5xl w-full mx-auto p-4 flex justify-between items-center glass rounded-2xl mb-4 neon-border">
        <h1 class="font-sport text-xl md:text-2xl italic font-black text-white">HOOPER<span class="text-orange-500">FLOW</span></h1>
        <div class="font-sport text-orange-500 text-xl md:text-3xl tabular-nums tracking-tighter">25:00</div>
    </nav>

    <main class="max-w-5xl w-full mx-auto flex-1 flex flex-col glass rounded-[2.5rem] overflow-hidden neon-border">
        <div class="p-4 bg-black/40 border-b border-zinc-800 flex justify-between items-center">
            <span id="status-tag" class="text-[10px] font-bold tracking-[0.3em] text-green-500 uppercase flex items-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> Sistema Inteligente Activo
            </span>
        </div>
        
        <div id="chat-box" class="flex-1 p-4 md:p-8 overflow-y-auto h-[500px] flex flex-col gap-6">
            <div class="bubble-coach">
                🏀 **¡SISTEMA ACTUALIZADO!** He reconfigurado mis protocolos de comunicación. <br><br>
                Ya estoy listo para charlar de basket, estudios o lo que necesites. ¡Dime algo!
            </div>
        </div>

        <div class="p-4 md:p-6 border-t border-zinc-800 bg-zinc-900/30">
            <div class="flex gap-3 bg-black/60 rounded-2xl p-2 border border-zinc-700 focus-within:border-orange-500 transition-all">
                <input id="user-input" type="text" placeholder="Escribe aquí tu mensaje..." class="flex-1 bg-transparent outline-none p-3 text-sm md:text-base text-white">
                <button id="send-btn" class="bg-orange-600 px-6 md:px-10 py-3 rounded-xl font-black text-xs md:text-sm uppercase text-black hover:bg-orange-500 transition-all active:scale-95">ENVIAR</button>
            </div>
        </div>
    </main>

    <script>
        const KEY_IA = "AIzaSyDgGdfa-cKcXhd_iI7Gn3hDtE5awLHYhj0";
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');

        function appendMsg(content, type) {
            const div = document.createElement('div');
            div.className = type === 'coach' ? "bubble-coach shadow-2xl border-l-4 border-orange-500" : "bubble-user shadow-xl";
            div.innerHTML = content.replace(/\n/g, '<br>');
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }

        async function talkToIA(prompt) {
            const loadingDiv = appendMsg("Buscando señal...", "coach");
            
            // LISTA DE MODELOS A INTENTAR (Por si uno falla en tu región)
            const modelos = [
                "gemini-1.5-flash",
                "gemini-1.5-flash-latest",
                "gemini-pro"
            ];

            let exito = false;

            for (const modelName of modelos) {
                if (exito) break;
                
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${KEY_IA}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Actúa como un coach de basket y mentor. Sé breve y usa negritas. Pregunta: ${prompt}` }] }]
                        })
                    });

                    const data = await response.json();

                    if (response.ok && data.candidates) {
                        const aiText = data.candidates[0].content.parts[0].text;
                        loadingDiv.innerHTML = aiText.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
                        exito = true;
                    }
                } catch (e) {
                    console.log(`Fallo con ${modelName}, intentando el siguiente...`);
                }
            }

            if (!exito) {
                loadingDiv.innerHTML = "❌ **ERROR CRÍTICO:** Google está rechazando la conexión en tu zona. Prueba a generar una clave nueva en AI Studio.";
            }
        }

        document.getElementById('send-btn').onclick = () => {
            const val = userInput.value.trim();
            if(!val) return;
            appendMsg(val, 'user');
            talkToIA(val);
            userInput.value = "";
        };

        userInput.addEventListener("keypress", (e) => { if(e.key === "Enter") document.getElementById('send-btn').click(); });
    </script>
</body>
</html>
