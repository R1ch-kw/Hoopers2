<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hooper Flow | Performance Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: white; }
        .font-sport { font-family: 'Orbitron', sans-serif; }
        .card-dark { background: #111; border: 1px solid #222; border-radius: 12px; }
        .accent-glow { text-shadow: 0 0 10px rgba(255, 107, 0, 0.5); }
        .btn-active { background: #ff6b00; color: black; font-weight: 900; }
    </style>
</head>
<body class="pb-10">

    <header class="p-6 border-b border-zinc-800 flex justify-between items-center bg-black sticky top-0 z-50">
        <h1 class="font-sport text-xl tracking-widest accent-glow">HOOPER<span class="text-orange-500">FLOW</span></h1>
        <div id="timer-display" class="font-sport text-orange-500 text-xl">25:00</div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">
        
        <section class="card-dark p-5 text-center border-2 border-orange-600/20">
            <h2 class="text-xs font-bold text-zinc-500 uppercase mb-3">Modo Enfoque</h2>
            <div class="flex justify-center gap-4 mb-4">
                <button onclick="startTimer(25)" class="bg-zinc-800 px-4 py-2 rounded-full text-xs hover:bg-orange-600 transition">Estudiar</button>
                <button onclick="startTimer(5)" class="bg-zinc-800 px-4 py-2 rounded-full text-xs hover:bg-green-600 transition">Break Activo</button>
                <button onclick="resetTimer()" class="bg-red-900/30 px-4 py-2 rounded-full text-xs">Reset</button>
            </div>
            <p id="timer-label" class="text-sm italic text-zinc-400">Listo para empezar...</p>
        </section>

        <section class="card-dark p-5">
            <h2 class="font-sport text-sm mb-4 text-orange-500 underline">COACH IA</h2>
            <div id="chat-box" class="h-40 overflow-y-auto text-sm text-zinc-400 mb-4 space-y-2 pr-2">
                <p>🏀 Coach: ¿Qué toca hoy? Escribe "entreno" para una rutina de tiro o "estudio" para un tip de enfoque.</p>
            </div>
            <div class="flex gap-2">
                <input id="user-input" type="text" placeholder="Dime algo..." class="flex-1 bg-zinc-800 border-none rounded-lg p-3 text-sm outline-none">
                <button id="send-btn" class="bg-orange-600 p-3 rounded-lg font-bold">GO</button>
            </div>
        </section>

    </main>

    <script>
        // LÓGICA DEL TEMPORIZADOR
        let timeLeft;
        let timerId = null;

        function startTimer(minutes) {
            clearInterval(timerId);
            timeLeft = minutes * 60;
            document.getElementById('timer-label').innerText = minutes === 25 ? "Concentración Total 🧠" : "¡Muévete! 🏀";
            
            timerId = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    alert(minutes === 25 ? "¡Bloque terminado! Haz 10 flexiones y estira." : "¡Descanso terminado! A estudiar.");
                }
            }, 1000);
        }

        function resetTimer() {
            clearInterval(timerId);
            timeLeft = 25 * 60;
            updateDisplay();
            document.getElementById('timer-label').innerText = "Listo para empezar...";
        }

        function updateDisplay() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('timer-display').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        // LÓGICA DEL COACH
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        
        const coachLogic = {
            "estudio": "Usa la técnica Pomodoro: Estudia 25 min sin celular. En el break, haz círculos con los tobillos.",
            "entreno": "Hoy: 50 bandejas (25 por mano) + 100 tiros libres. No te vayas hasta meter 5 seguidos.",
            "estirar": "Haz el 'Couch Stretch' para abrir la cadera. Estar sentado estudiando te quita salto vertical.",
            "hola": "¡Hola Hooper! ¿Listo para grindear hoy?"
        };

        document.getElementById('send-btn').onclick = () => {
            const text = userInput.value.toLowerCase();
            if(text == "") return;
            
            chatBox.innerHTML += `<p class='text-orange-500'>➤ Tú: ${text}</p>`;
            
            setTimeout(() => {
                let respuesta = "No te entiendo, pero recuerda: El trabajo duro gana al talento cuando el talento no trabaja duro.";
                for (let key in coachLogic) {
                    if (text.includes(key)) respuesta = coachLogic[key];
                }
                chatBox.innerHTML += `<p class='text-zinc-300'>🏀 Coach: ${respuesta}</p>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 500);
            
            userInput.value = "";
        };
    </script>
</body>
</html>
