<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOOPER FLOW | ELITE AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --orange: #ff6b00; --dark-bg: #080808; }
        body { font-family: 'Inter', sans-serif; background: var(--dark-bg); color: white; margin: 0; }
        .font-sport { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(255,107,0,0.2); }
        .bubble-coach { background: #111; border-left: 4px solid var(--orange); border-radius: 4px 15px 15px 15px; margin-right: 10%; padding: 1rem; }
        .bubble-user { background: var(--orange); color: black; font-weight: 800; border-radius: 15px 15px 4px 15px; margin-left: 10%; align-self: flex-end; padding: 1rem; }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4">

    <nav class="max-w-5xl w-full mx-auto p-4 flex justify-between items-center glass rounded-2xl mb-4">
        <h1 class="font-sport text-xl italic font-black">HOOPER<span class="text-orange-500">FLOW</span></h1>
        <div class="font-sport text-orange-500 text-2xl">25:00</div>
    </nav>

    <main class="max-w-5xl w-full mx-auto flex-1 flex flex-col glass rounded-[2rem] overflow-hidden">
        <div id="chat-box" class="flex-1 p-6 overflow-y-auto h-[500px] flex flex-col gap-6">
            <div class="bubble-coach">
                🏀 **SISTEMA RESETEADO.** He cambiado la frecuencia de conexión. <br><br>
                Si después de este cambio sigue fallando, es que Google necesita que valides tu cuenta en su panel. ¡Lanza tu pregunta!
            </div>
        </div>

        <div class="p-6 border-t border-zinc-800">
            <div class="flex gap-3 bg-black/50 rounded-2xl p-2 border border-zinc-700">
                <input id="user-input" type="text" placeholder="¿En qué te ayudo hoy?" class="flex-1 bg-transparent outline-none p-3 text-white">
                <button id="send-btn" class="bg-orange-600 px-8 py-3 rounded-xl font-black text-black hover:bg-orange-500 transition-all">ENVIAR</button>
            </div>
        </div>
    </main>

    <script>
        // TU LLAVE (Asegúrate de que no tenga espacios)
        const KEY_IA = "AIzaSyDgGdfa-cKcXhd_iI7Gn3hDtE5awLHYhj0";
        const chatBox = document.getElementById('chat-box');

        function appendMsg(content, type) {
            const div = document.createElement('div');
            div.className = type === 'coach' ? "bubble-coach" : "bubble-user";
            div.innerHTML = content.replace(/\n/g, '<br>');
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }

        async function talkToIA(prompt) {
            const loadingDiv = appendMsg("Coach analizando...", "coach");
            
            try {
                // USAMOS EL ENDPOINT MÁS SEGURO DE 2026
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${KEY_IA}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Eres un coach de basket y mentor. Responde breve: ${prompt}` }] }]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    loadingDiv.innerHTML = `❌ **BLOQUEO DE GOOGLE:** Tu cuenta requiere validación. Ve a Google AI Studio y pulsa en "Configurar la facturación" para activar la llave en España.`;
                    console.error(data.error);
                } else {
                    const aiText = data.candidates[0].content.parts[0].text;
                    loadingDiv.innerHTML = aiText.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
                }
            } catch (e) {
                loadingDiv.innerHTML = "❌ **ERROR DE CONEXIÓN.** Revisa tu internet.";
            }
        }

        document.getElementById('send-btn').onclick = () => {
            const val = document.getElementById('user-input').value.trim();
            if(!val) return;
            appendMsg(val, 'user');
            talkToIA(val);
            document.getElementById('user-input').value = "";
        };
    </script>
</body>
</html>
