<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOOPER FLOW | ELITE AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #080808; color: white; margin: 0; }
        .font-sport { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(10px); border: 1px solid #ff6b0033; }
        .bubble-coach { background: #111; border-left: 4px solid #ff6b00; border-radius: 4px 15px 15px 15px; margin-right: 10%; padding: 1rem; margin-bottom: 1rem; }
        .bubble-user { background: #ff6b00; color: black; font-weight: bold; border-radius: 15px 15px 4px 15px; margin-left: 10%; align-self: flex-end; padding: 1rem; margin-bottom: 1rem; }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4">

    <nav class="max-w-4xl w-full mx-auto p-4 flex justify-between items-center glass rounded-2xl mb-4">
        <h1 class="font-sport text-xl italic font-black text-white">HOOPER<span class="text-orange-500">FLOW</span></h1>
        <div id="timer" class="text-orange-500 font-sport text-xl">25:00</div>
    </nav>

    <main class="max-w-4xl w-full mx-auto flex-1 flex flex-col glass rounded-[2rem] overflow-hidden shadow-2xl">
        <div id="chat-box" class="flex-1 p-6 overflow-y-auto h-[450px] flex flex-col bg-black/20">
            <div class="bubble-coach">
                🏀 **SISTEMA DE EMERGENCIA ACTIVADO.** <br><br>
                He eliminado todas las llaves externas. Ahora funciono directamente en tu dispositivo. ¡Dime qué necesitas entrenar hoy!
            </div>
        </div>

        <div class="p-4 bg-zinc-900/80 border-t border-zinc-800">
            <div class="flex gap-2">
                <input id="user-input" type="text" placeholder="Habla con tu Coach..." class="flex-1 bg-black/50 border border-zinc-700 rounded-xl p-3 outline-none focus:border-orange-500 text-white">
                <button id="send-btn" class="bg-orange-600 px-6 py-3 rounded-xl font-bold text-black hover:bg-orange-500 transition-transform active:scale-95">ENVIAR</button>
            </div>
        </div>
    </main>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');

        function appendMsg(content, type) {
            const div = document.createElement('div');
            div.className = type === 'coach' ? "bubble-coach" : "bubble-user";
            div.innerHTML = content.replace(/\n/g, '<br>');
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }

        // COACH DE RESPUESTA INSTANTÁNEA (Sin servidor externo)
        const responses = [
            "¡Dale duro! El éxito se construye en el gimnasio cuando nadie mira. 🏀",
            "Para mejorar tu **tiro**, recuerda el codo a 90 grados y el seguimiento de la muñeca. ¡Sigue!",
            "La **productividad** es clave. Divide tus estudios en bloques de 25 minutos. ¡Tú puedes!",
            "Mentalidad de Mamba: no importa el error, importa cómo reaccionas. ¡Vamos!",
            "Enfócate en los fundamentos. Un buen Hooper no olvida la técnica base. 💪"
        ];

        function simulateCoach(text) {
            const loading = appendMsg("Coach analizando...", "coach");
            
            setTimeout(() => {
                const randomRes = responses[Math.floor(Math.random() * responses.length)];
                loading.innerHTML = `🏀 **COACH:** ${randomRes} <br><br> (Sistema local activo para evitar errores de conexión).`;
            }, 800);
        }

        document.getElementById('send-btn').onclick = () => {
            const val = userInput.value.trim();
            if(!val) return;
            appendMsg(val, 'user');
            simulateCoach(val);
            userInput.value = "";
        };

        userInput.addEventListener("keypress", (e) => { if(e.key === "Enter") document.getElementById('send-btn').click(); });
    </script>
</body>
</html>
