<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOOPER FLOW | ELITE AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --orange: #ff6b00; --dark-bg: #080808; }
        body { font-family: 'Inter', sans-serif; background-color: var(--dark-bg); color: white; margin: 0; }
        .font-sport { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,107,0,0.2); }
        .neon-border { border: 1px solid var(--orange); box-shadow: 0 0 20px rgba(255, 107, 0, 0.15); }
        .bubble-coach { background: #151515; border-left: 4px solid var(--orange); border-radius: 4px 15px 15px 15px; margin-right: 12%; }
        .bubble-user { background: var(--orange); color: black; font-weight: 700; border-radius: 15px 15px 4px 15px; margin-left: 12%; align-self: flex-end; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--orange); border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col p-2 md:p-6">

    <nav class="max-w-5xl w-full mx-auto p-4 flex justify-between items-center glass rounded-2xl mb-4 neon-border">
        <h1 class="font-sport text-lg md:text-2xl italic font-black tracking-tighter text-white">HOOPER<span class="text-orange-500">FLOW</span></h1>
        <div id="timer-display" class="font-sport text-orange-500 text-xl md:text-3xl tabular-nums">25:00</div>
    </nav>

    <main class="max-w-5xl w-full mx-auto flex-1 flex flex-col glass rounded-[2rem] overflow-hidden neon-border">
        <div class="p-4 bg-zinc-900/80 border-b border-zinc-800 flex flex-wrap justify-between items-center gap-2">
            <span class="text-[10px] font-bold tracking-[0.3em] uppercase text-orange-500">Elite Coach AI Status: <span class="text-green-500">Active</span></span>
            <input type="password" id="api-key" placeholder="Pega tu API KEY aquí..." class="bg-black border border-zinc-700 rounded-lg px-3 py-1 text-[10px] w-full md:w-64 outline-none focus:border-orange-500 transition-all text-white">
        </div>
        
        <div id="chat-box" class="flex-1 p-4 md:p-8 overflow-y-auto h-[450px] flex flex-col gap-6 bg-gradient-to-b from-transparent to-black/40">
            <div class="bubble-coach p-4 text-sm md:text-base leading-relaxed animate-in fade-in duration-700">
                🏀 **CONEXIÓN ESTABLECIDA.** Soy tu Coach personal. 
                <br><br>
                He analizado tu sistema. Estoy listo para optimizar tu **tiro**, tu **mentalidad** y tu **productividad**. ¿Qué misión tenemos para hoy?
            </div>
        </div>

        <div class="p-4 md:p-6 bg-zinc-900/50 border-t border-zinc-800">
            <div class="flex gap-3 bg-black/80 rounded-2xl p-2 border border-zinc-700 focus-within:border-orange-500 transition-all shadow-2xl">
                <input id="user-input" type="text" placeholder="Escribe un mensaje..." class="flex-1 bg-transparent outline-none p-3 text-sm md:text-base text-white">
                <button id="send-btn" class="bg-orange-600 px-6 md:px-10 py-3 rounded-xl font-black text-xs md:text-sm uppercase hover:bg-orange-500 transition-all active:scale-95 text-black">ENVIAR</button>
            </div>
        </div>
    </main>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const apiKeyInput = document.getElementById('api-key');

        // Intentar recuperar la llave guardada
        window.onload = () => {
            const savedKey = localStorage.getItem('hoop_key');
            if(savedKey) apiKeyInput.value = savedKey;
        };

        function appendMsg(content, type) {
            const div = document.createElement('div');
            div.className = type === 'coach' ? "bubble-coach p-4 text-sm md:text-base shadow-2xl border-l-4 border-orange-600" : "bubble-user p-4 text-sm md:text-base shadow-xl";
            div.innerHTML = content.replace(/\n/g, '<br>');
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }

        async function talkToIA(prompt) {
            const key = apiKeyInput.value.trim();
            if(!key) {
                appendMsg("⚠️ **ATENCIÓN:** Falta la API KEY en el panel superior para procesar la respuesta.", "coach");
                return;
            }
            localStorage.setItem('hoop_key', key);

            const loadingDiv = appendMsg("Pensando jugada...", "coach");

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Eres un entrenador de baloncesto de élite y un mentor de estudios. El usuario es un atleta-estudiante que busca el máximo rendimiento. Responde de forma técnica, motivadora y con estructura clara (usa negritas). El usuario dice: ${prompt}` }] }]
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                
                const aiText = data.candidates[0].content.parts[0].text;
                loadingDiv.innerHTML = aiText.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\n/g, '<br>');

            } catch (e) {
                loadingDiv.innerHTML = "❌ **ERROR DE SISTEMA:** La llave es inválida o hay un problema de red. Verifica la llave en Google AI Studio.";
                console.error(e);
            }
        }

        document.getElementById('send-btn').onclick = () => {
            const val = userInput.value.trim();
            if(!val) return;
            appendMsg(val, 'user');
            talkToIA(val);
            userInput.value = "";
        };

        userInput.addEventListener("keypress", (e) => { if(e.key === "Enter") document.getElementById('send-btn').click(); });
    </script>
</body>
</html>
