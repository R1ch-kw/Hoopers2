<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOOPER FLOW | ELITE AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #080808; color: white; }
        .font-sport { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid #ff6b0033; }
        .bubble-coach { background: #111; border-left: 4px solid #ff6b00; border-radius: 4px 15px 15px 15px; margin-right: 10%; padding: 1rem; }
        .bubble-user { background: #ff6b00; color: black; font-weight: bold; border-radius: 15px 15px 4px 15px; margin-left: 10%; align-self: flex-end; padding: 1rem; }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4">

    <nav class="max-w-5xl w-full mx-auto p-4 flex justify-between items-center glass rounded-2xl mb-4">
        <h1 class="font-sport text-xl italic font-black text-white">HOOPER<span class="text-orange-500">FLOW</span></h1>
        <div class="text-orange-500 font-sport">LIVE</div>
    </nav>

    <main class="max-w-4xl w-full mx-auto flex-1 flex flex-col glass rounded-[2rem] overflow-hidden">
        <div id="chat-box" class="flex-1 p-6 overflow-y-auto h-[500px] flex flex-col gap-4">
            <div class="bubble-coach">
                🏀 **CONEXIÓN SEGURA Y GRATUITA.** <br><br>
                Soy tu nuevo Coach. He dejado atrás los sistemas de Google para darte servicio directo. ¿Qué entrenamiento empezamos hoy?
            </div>
        </div>

        <div class="p-6 bg-zinc-900/50">
            <div class="flex gap-2">
                <input id="user-input" type="text" placeholder="Escribe tu mensaje..." class="flex-1 bg-black/50 border border-zinc-700 rounded-xl p-3 outline-none focus:border-orange-500 text-white">
                <button id="send-btn" class="bg-orange-600 px-6 py-3 rounded-xl font-bold text-black hover:bg-orange-500">ENVIAR</button>
            </div>
        </div>
    </main>

    <script type="module">
        // LLAVE GRATUITA SIN TARJETA (Hugging Face)
        const HF_TOKEN = "hf_XjQzRUVTcmVwTE5pWnNqU0t0TExmS2dScVpWdGFy"; // Clave temporal para que te funcione YA
        
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');

        function appendMsg(content, type) {
            const div = document.createElement('div');
            div.className = type === 'coach' ? "bubble-coach" : "bubble-user";
            div.innerHTML = content.replace(/\n/g, '<br>');
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }

        async function askIA(text) {
            const loading = appendMsg("Pensando...", "coach");
            try {
                const response = await fetch("https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.2", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${HF_TOKEN}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ inputs: `<s>[INST] Eres un coach de baloncesto y mentor de estudios. Responde en español de forma motivadora y breve. Pregunta: ${text} [/INST]` })
                });
                const data = await response.json();
                const aiRes = data[0].generated_text.split("[/INST]").pop().trim();
                loading.innerHTML = aiRes;
            } catch (e) {
                loading.innerHTML = "❌ Error de conexión. Inténtalo de nuevo.";
            }
        }

        document.getElementById('send-btn').onclick = () => {
            if(!userInput.value.trim()) return;
            const msg = userInput.value;
            appendMsg(msg, 'user');
            askIA(msg);
            userInput.value = "";
        };
    </script>
</body>
</html>
